server.port=0

spring.profiles.default=edge

spring.datasource.url=${ZIVAI_DB_URL:jdbc:postgresql://localhost:5432/zivai}
spring.datasource.username=${ZIVAI_DB_USERNAME:zivai}
spring.datasource.password=${ZIVAI_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.seed.enabled=false
app.sync.edge.worker-enabled=false
app.sync.edge.capture-enabled=false

logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate.SQL=WARN
