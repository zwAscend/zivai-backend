spring.application.name=core-backend
server.port=5000
spring.profiles.default=edge
app.runtime.scenario=AUTO

spring.jmx.enabled=true

# Database (override with environment variables)
spring.datasource.url=${ZIVAI_DB_URL:jdbc:postgresql://localhost:5432/zivai}
spring.datasource.username=${ZIVAI_DB_USERNAME:zivai}
spring.datasource.password=${ZIVAI_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ZivaiCBEHikariConnPool
spring.datasource.hikari.registerMbeans=true
spring.datasource.hikari.leak-detection-threshold=60000
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.com.zaxxer.hikari=DEBUG

app.sync.edge.worker-enabled=true
app.sync.edge.capture-enabled=true
app.sync.edge.batch-size=100
app.sync.edge.poll-interval-ms=30000
app.sync.edge.connect-timeout-ms=${ZIVAI_SYNC_EDGE_CONNECT_TIMEOUT_MS:5000}
app.sync.edge.read-timeout-ms=${ZIVAI_SYNC_EDGE_READ_TIMEOUT_MS:45000}
app.sync.edge.http-max-attempts=${ZIVAI_SYNC_EDGE_HTTP_MAX_ATTEMPTS:3}
app.sync.edge.retry-backoff-ms=${ZIVAI_SYNC_EDGE_RETRY_BACKOFF_MS:1000}
app.sync.edge.cloud-base-url=${ZIVAI_CLOUD_SYNC_BASE_URL:}
app.sync.edge.node-id=${ZIVAI_EDGE_NODE_ID:}
app.sync.edge.auth-key=${ZIVAI_EDGE_AUTH_KEY:}
app.sync.cloud.pull-batch-size=200
app.sync.cloud.require-auth=${ZIVAI_SYNC_REQUIRE_AUTH:false}

# Huawei OCR (recommended via environment variables)
app.hwc.ak=${HWC_AK:}
app.hwc.sk=${HWC_SK:}
app.hwc.project-id=${HWC_PROJECT_ID:}
app.hwc.ocr-endpoint=${HWC_OCR_ENDPOINT:https://ocr.ap-southeast-1.myhuaweicloud.com}
app.hwc.host=${HWC_HOST:ocr.ap-southeast-1.myhuaweicloud.com}
app.hwc.force-trailing-slash=${HWC_FORCE_TRAILING_SLASH:false}
app.hwc.http-timeout-seconds=${HWC_HTTP_TIMEOUT_SECONDS:180}
app.hwc.general-text.detect-direction=${HWC_GENERAL_TEXT_DETECT_DIRECTION:true}
app.hwc.general-text.quick-mode=${HWC_GENERAL_TEXT_QUICK_MODE:false}
app.hwc.general-text.max-original-file-size-bytes=${HWC_GENERAL_TEXT_MAX_ORIGINAL_FILE_SIZE_BYTES:7340032}
app.hwc.general-text.max-encoded-image-bytes=${HWC_GENERAL_TEXT_MAX_ENCODED_IMAGE_BYTES:2500000}
app.hwc.general-text.max-image-width=${HWC_GENERAL_TEXT_MAX_IMAGE_WIDTH:2200}
app.hwc.general-text.max-image-height=${HWC_GENERAL_TEXT_MAX_IMAGE_HEIGHT:2200}
app.hwc.general-text.jpeg-quality=${HWC_GENERAL_TEXT_JPEG_QUALITY:0.72}
app.hwc.general-text.min-jpeg-quality=${HWC_GENERAL_TEXT_MIN_JPEG_QUALITY:0.50}
app.hwc.general-text.adaptive-resize-percent=${HWC_GENERAL_TEXT_ADAPTIVE_RESIZE_PERCENT:85}
app.hwc.general-text.max-adaptive-passes=${HWC_GENERAL_TEXT_MAX_ADAPTIVE_PASSES:6}
app.hwc.general-text.timeout-retries=${HWC_GENERAL_TEXT_TIMEOUT_RETRIES:2}
app.hwc.general-text.retry-backoff-ms=${HWC_GENERAL_TEXT_RETRY_BACKOFF_MS:1000}
app.hwc.general-text.raster-output-format=${HWC_GENERAL_TEXT_RASTER_OUTPUT_FORMAT:jpg}
app.hwc.general-text.pdf-render-dpi=${HWC_GENERAL_TEXT_PDF_RENDER_DPI:200}
app.hwc.general-text.max-pdf-pages=${HWC_GENERAL_TEXT_MAX_PDF_PAGES:50}
app.hwc.general-text.pdf-render-image-format=${HWC_GENERAL_TEXT_PDF_RENDER_IMAGE_FORMAT:jpg}
app.hwc.general-text.allowed-formats=${HWC_GENERAL_TEXT_ALLOWED_FORMATS:jpeg,jpg,png,bmp,gif,tiff,tif,webp,pcx,ico,pdf,psd}

# Deployment scenarios
# CLOUD_ONLY: run with SPRING_PROFILES_ACTIVE=cloud
# EDGE_ONLY: run with SPRING_PROFILES_ACTIVE=edge and leave app.sync.edge.cloud-base-url empty
# HYBRID: run with SPRING_PROFILES_ACTIVE=edge and set app.sync.edge.cloud-base-url
