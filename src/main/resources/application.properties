spring.application.name=core-backend
server.port=5000
spring.profiles.default=edge
app.runtime.scenario=AUTO

spring.jmx.enabled=true

spring.datasource.url=${ZIVAI_DB_URL:jdbc:postgresql://localhost:5432/zivai}
spring.datasource.username=${ZIVAI_DB_USERNAME:zivai}
spring.datasource.password=${ZIVAI_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP settings#30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ZivaiCBEHikariConnPool
spring.datasource.hikari.registerMbeans=true
spring.datasource.hikari.leak-detection-threshold=60000
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Explicit dialect avoids startup failure when JDBC metadata is unavailable (e.g., DB down or URL empty).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_HOLD
logging.level.com.zaxxer.hikari= DEBUG

app.sync.edge.worker-enabled=true
app.sync.edge.capture-enabled=true
app.sync.edge.batch-size=100
app.sync.edge.poll-interval-ms=30000
app.sync.edge.cloud-base-url=${ZIVAI_CLOUD_SYNC_BASE_URL:}
app.sync.edge.node-id=${ZIVAI_EDGE_NODE_ID:}
app.sync.edge.auth-key=${ZIVAI_EDGE_AUTH_KEY:}
app.sync.cloud.pull-batch-size=200
app.sync.cloud.require-auth=${ZIVAI_SYNC_REQUIRE_AUTH:false}

